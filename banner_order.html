<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة اللوحات الإعلانية - Banner Imprint</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap");
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Cairo", sans-serif; }
        body { background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #fefce8 100%); min-height: 100vh; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .header { text-align: center; padding: 24px; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); border-radius: 24px; margin-bottom: 20px; }
        .header h1 { color: white; font-size: 22px; font-weight: 900; }
        .header p { color: rgba(255,255,255,0.9); font-size: 14px; margin-top: 4px; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .upload-area { border: 3px dashed #22c55e; border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; }
        .upload-area h3 { color: #16a34a; font-size: 18px; }
        .form-input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 16px; }
        .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Banner Imprint</h1>
            <p>طباعة اللوحات الإعلانية</p>
        </div>
        
        <div class="card">
            <div class="card-title">📤 رفع صورة العريس</div>
            <div class="upload-area" onclick="document.getElementById('file').click()">
                <h3>اضغط هنا لرفع الصورة</h3>
                <p>JPG / PNG - حتى 10MB</p>
            </div>
            <input type="file" id="file" accept="image/*" style="display:none" onchange="preview(this)">
            <div id="preview" style="margin-top:10px"></div>
        </div>

        <div class="card">
            <div class="card-title">📱 رقم الهاتف</div>
            <input type="tel" class="form-input" id="phone" placeholder="777123456">
        </div>

        <div class="card">
            <div class="card-title">💰 العربون: 3,000 ريال</div>
            <p>محفظة جيب: <b>777885692</b></p>
            <input type="text" class="form-input" id="txid" placeholder="رقم عملية التحويل" style="margin-top:10px">
        </div>

        <button class="submit-btn" onclick="send()">🚀 إرسال الطلب</button>
    </div>

    <script>
        let fileData = null;
        function preview(input) {
            if (input.files && input.files[0]) {
                fileData = input.files[0];
                document.getElementById('preview').innerHTML = '<img src="' + URL.createObjectURL(fileData) + '" style="max-width:100%;border-radius:10px">';
            }
        }
        async function send() {
            const phone = document.getElementById('phone').value;
            const txid = document.getElementById('txid').value;
            if (!fileData) { alert('ارفع صورة أولاً'); return; }
            if (!phone) { alert('أدخل رقم الهاتف'); return; }
            if (!txid) { alert('أدخل رقم العملية'); return; }
            
            const form = new FormData();
            form.append('image', fileData);
            form.append('phone', phone);
            form.append('transaction_id', txid);
            
            try {
                const res = await fetch('/api/order', {method: 'POST', body: form});
                const data = await res.json();
                if (data.success) {
                    alert('✅ تم الإرسال!');
                    window.open('https://wa.me/777885692?text=' + encodeURIComponent('طلب جديد\\nهاتف: ' + phone + '\\nعملية: ' + txid), '_blank');
                } else { alert('❌ خطأ: ' + data.error); }
            } catch(e) {
                alert('❌ خطأ في الاتصال');
            }
        }
    </script>
</body>
</html>
